<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Do You Love Me?</title>

<style>
body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    text-align: center;
    background: linear-gradient(to bottom, #ffc0cb, #ffe6f0);
    overflow: hidden;
}

h1 {
    margin-top: 100px;
    color: #ff3385;
    font-size: 40px;
}

.buttons {
    margin-top: 40px;
}

button {
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    margin: 10px;
    transition: 0.3s;
}

.yes {
    background-color: #ff4d88;
    color: white;
}

.yes:hover {
    transform: scale(1.1);
}

.no {
    background-color: #666;
    color: white;
    position: absolute;
}

.message {
    margin-top: 30px;
    font-size: 22px;
    color: #ff3385;
}

/* Hati jatuh */
.heart {
    position: absolute;
    color: pink;
    font-size: 20px;
    animation: fall linear infinite;
}

@keyframes fall {
    0% {
        transform: translateY(-10px);
        opacity: 1;
    }
    100% {
        transform: translateY(100vh);
        opacity: 0;
    }
}
</style>

</head>
<body>

<h1>Do you love me? 💗</h1>

<div class="buttons">
    <button class="yes" onclick="sayYes()">Yes 💖</button>
    <button class="no" id="noBtn" onmouseover="moveButton()">No 💔</button>
</div>

<p class="message" id="message"></p>

<script>
function sayYes() {
    document.getElementById("message").innerText = "AWWW I LOVE YOU TOO 💕🥺";
}

function moveButton() {
    let btn = document.getElementById("noBtn");
    let x = Math.random() * window.innerWidth;
    let y = Math.random() * window.innerHeight;

    btn.style.left = x + "px";
    btn.style.top = y + "px";
}

// bikin hati jatuh
setInterval(() => {
    let heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerText = "💗";

    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.animationDuration = (Math.random() * 3 + 2) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}, 300);
</script>

</body>
</html>
